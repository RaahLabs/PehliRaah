<!DOCTYPE html>
<html>
<head>
  <title>Behavior Assessment</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    .game { border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 8px; }
    button { margin: 5px; padding: 8px 12px; }
  </style>
</head>

<body>

<h2>Behavior Assessment</h2>

<!-- 🎈 BALLOON GAME -->
<div class="game">
  <h3>🎈 Balloon Game</h3>
  <p>Pumps: <span id="pumps">0</span></p>
  <p>Bank: <span id="bank">0</span></p>
  <button onclick="pump()">Pump</button>
  <button onclick="cashOut()">Cash Out</button>
</div>

<!-- 🤝 TRUST GAME -->
<div class="game">
  <h3>🤝 Trust Game</h3>
  <p>Choose:</p>
  <button onclick="trustChoice('cooperate')">Cooperate</button>
  <button onclick="trustChoice('defect')">Defect</button>
</div>

<!-- 🧠 HANOI SIMPLIFIED -->
<div class="game">
  <h3>🧠 Planning Game</h3>
  <p>Moves: <span id="moves">0</span></p>
  <button onclick="makeMove()">Make Move</button>
</div>

<!-- ⚡ REACTION GAME -->
<div class="game">
  <h3>⚡ Reaction Game</h3>
  <button onclick="startReaction()">Start</button>
  <button onclick="clickReaction()">Click!</button>
  <p id="reactionResult"></p>
</div>

<br>
<button onclick="generateFinalInsights()">See My Results</button>

<div id="results"></div>

<script>

// ================= DATA STORE =================
let gameData = {
  balloon: { rounds: [] },
  trust: { choices: [] },
  hanoi: { moves: 0 },
  reaction: { times: [] }
};

let feedbackLog = [];

// ================= BALLOON =================
let pumps = 0;
let bank = 0;
let burst = Math.floor(Math.random() * 10) + 5;

function pump() {
  pumps++;
  document.getElementById("pumps").innerText = pumps;

  if (pumps >= burst) {
    gameData.balloon.rounds.push(pumps);
    pumps = 0;
    burst = Math.floor(Math.random() * 10) + 5;
    alert("Burst!");
  }
}

function cashOut() {
  bank += pumps;
  gameData.balloon.rounds.push(pumps);
  pumps = 0;
  document.getElementById("bank").innerText = bank;
}

// ================= TRUST =================
function trustChoice(choice) {
  gameData.trust.choices.push(choice);
  alert("You chose: " + choice);
}

// ================= HANOI =================
function makeMove() {
  gameData.hanoi.moves++;
  document.getElementById("moves").innerText = gameData.hanoi.moves;
}

// ================= REACTION =================
let startTime = 0;

function startReaction() {
  startTime = Date.now();
}

function clickReaction() {
  if (startTime === 0) return;
  let time = Date.now() - startTime;
  gameData.reaction.times.push(time);
  document.getElementById("reactionResult").innerText = time + " ms";
  startTime = 0;
}

// ================= SIGNAL ENGINE =================
function computeSignals() {
  let signals = {};

  // Balloon
  let rounds = gameData.balloon.rounds;
  if (rounds.length > 0) {
    let avg = rounds.reduce((a,b)=>a+b,0)/rounds.length;
    signals.risk = avg;
  }

  // Trust
  let coop = gameData.trust.choices.filter(x=>x==="cooperate").length;
  let total = gameData.trust.choices.length;
  signals.trust = total ? (coop/total) : 0;

  // Hanoi
  signals.planning = gameData.hanoi.moves;

  // Reaction
  if (gameData.reaction.times.length > 0) {
    let avg = gameData.reaction.times.reduce((a,b)=>a+b,0)/gameData.reaction.times.length;
    signals.speed = avg;
  }

  return signals;
}

// ================= INSIGHTS =================
function generateInsights(s) {
  let insights = [];

  if (s.risk > 20) insights.push("You take high risks, even under uncertainty.");
  else insights.push("You are cautious in taking risks.");

  if (s.trust > 0.6) insights.push("You trust others easily.");
  else insights.push("You are cautious in trusting others.");

  if (s.planning < 10) insights.push("You act quickly without much planning.");
  else insights.push("You take time to plan actions.");

  if (s.speed < 300) insights.push("You make fast decisions.");
  else insights.push("You take time before acting.");

  return insights;
}

// ================= FINAL OUTPUT =================
function generateFinalInsights() {
  const signals = computeSignals();
  const insights = generateInsights(signals);

  const div = document.getElementById("results");
  div.innerHTML = "<h3>Your Insights</h3>";

  insights.forEach(insight => {
    const block = document.createElement("div");
    block.innerHTML = `
      <p>${insight}</p>
      <button onclick="feedback('yes')">Yes</button>
      <button onclick="feedback('somewhat')">Somewhat</button>
      <button onclick="feedback('no')">No</button>
      <hr/>
    `;
    div.appendChild(block);
  });

  let btn = document.createElement("button");
  btn.innerText = "Check Accuracy";
  btn.onclick = showAccuracy;
  div.appendChild(btn);
}

// ================= FEEDBACK =================
function feedback(ans) {
  feedbackLog.push(ans);
}

function showAccuracy() {
  let yes = feedbackLog.filter(x=>x==="yes").length;
  let score = Math.round((yes/feedbackLog.length)*100);

  document.getElementById("results").innerHTML = `
    <h3>Accuracy: ${score}%</h3>
  `;
}

</script>

</body>
</html>
