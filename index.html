<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Raah Labs — 6 Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; color: #1a1a1a; line-height: 1.4; }
    .container { max-width: 500px; margin: 0 auto; padding: 1rem; }
    .card { background: white; border-radius: 20px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e5e3df; }
    .btn { background: #c47a2e; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    .btn-outline { background: transparent; border: 1px solid #c47a2e; color: #c47a2e; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .game-card { background: #fef8ed; border-left: 5px solid #c47a2e; cursor: pointer; }
    .progress-bar { height: 6px; background: #e0dbd1; border-radius: 10px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: #c47a2e; width: 0%; }
    .pill { background: #e9e4da; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; display: inline-block; margin-bottom: 8px; }
    input, select { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ddd; margin: 5px 0 12px; }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; }
    .text-center { text-align: center; }
    .surface { background: #f0ede8; padding: 1rem; border-radius: 16px; margin: 10px 0; }
    .toh-peg { background: #e9e4da; border-radius: 12px; padding: 8px; min-width: 80px; text-align: center; cursor: pointer; }
    .toh-peg.selected { background: #f7e5c2; border: 2px solid #c47a2e; }
    .toh-discs { height: 90px; display: flex; flex-direction: column-reverse; align-items: center; gap: 3px; }
    .disc { height: 18px; border-radius: 20px; background: #c47a2e; }
    .balloon { font-size: 70px; transition: 0.1s; }
    .stroop-word { font-size: 48px; font-weight: bold; text-align: center; margin: 20px 0; }
    .error { background: #ffe0db; color: #b33; padding: 8px; border-radius: 12px; display: none; margin-bottom: 12px; }
  </style>
</head>
<body>

<div id="app">
  <!-- LANDING -->
  <div id="landing" class="container">
    <div class="card" style="text-align:center">
      <h1 style="color:#c47a2e">Raah Labs</h1>
      <p>6 science-backed games · 20 minutes</p>
      <button class="btn" onclick="showSignup()">Create account →</button>
      <button class="btn btn-outline" onclick="showLogin()">Login</button>
      <div class="progress-bar" style="margin-top:20px"><div class="progress-fill" style="width:0%"></div></div>
      <button class="btn-outline btn-sm" style="margin-top:15px" onclick="resetAll()">⚠️ Reset all data</button>
    </div>
  </div>

  <!-- AUTH / CONTEXT / DASHBOARD / GAME will be injected dynamically -->
  <div id="dynamic"></div>
</div>

<script>
  // ---------- SIMPLE STORAGE ----------
  const STORAGE_KEY = 'raah_user';
  let user = null;
  
  function saveUser() { localStorage.setItem(STORAGE_KEY, JSON.stringify(user)); }
  function loadUser() { 
    let raw = localStorage.getItem(STORAGE_KEY);
    if(raw) user = JSON.parse(raw);
    else user = null;
  }
  
  // ---------- ROUTING ----------
  function render() {
    if(!user) renderLanding();
    else if(!user.context) renderContext();
    else renderDashboard();
  }
  
  function renderLanding() {
    document.getElementById('dynamic').innerHTML = '';
    document.getElementById('landing').style.display = 'block';
  }
  
  function showSignup() { renderAuth('signup'); }
  function showLogin() { renderAuth('login'); }
  
  function renderAuth(mode) {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('dynamic').innerHTML = `
      <div class="container">
        <div class="card">
          <h3>${mode === 'signup' ? 'Sign up' : 'Login'}</h3>
          <div class="error" id="authError"></div>
          ${mode === 'signup' ? `<input type="text" id="name" placeholder="Full name"><input type="email" id="email" placeholder="Email"><input type="tel" id="mobile" placeholder="Mobile (10 digits)" maxlength="10">` : ''}
          <input type="text" id="loginId" placeholder="${mode === 'signup' ? 'Email' : 'Email or mobile'}">
          <input type="password" id="password" placeholder="Password">
          <button class="btn" id="authBtn">${mode === 'signup' ? 'Create account' : 'Login'}</button>
          <button class="btn-outline" onclick="renderLanding()">Back</button>
        </div>
      </div>
    `;
    document.getElementById('authBtn').onclick = () => {
      if(mode === 'signup') {
        let name = document.getElementById('name').value.trim();
        let email = document.getElementById('email').value.trim();
        let mobile = document.getElementById('mobile').value.trim();
        let pw = document.getElementById('password').value;
        if(!name || !email || !mobile || mobile.length !== 10 || !pw || pw.length < 4) {
          document.getElementById('authError').innerText = 'Invalid details';
          document.getElementById('authError').style.display = 'block';
          return;
        }
        user = { name, email, mobile, password: pw, scores: [], context: null };
        saveUser();
        renderContext();
      } else {
        let id = document.getElementById('loginId').value.trim();
        let pw = document.getElementById('password').value;
        if(user && (user.email === id || user.mobile === id) && user.password === pw) {
          renderContext();
        } else {
          document.getElementById('authError').innerText = 'Invalid credentials';
          document.getElementById('authError').style.display = 'block';
        }
      }
    };
  }
  
  function renderContext() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('dynamic').innerHTML = `
      <div class="container">
        <div class="card">
          <h3>Almost there</h3>
          <label>Gender</label><select id="gender"><option>Male</option><option>Female</option><option>Non-binary</option><option>Skip</option></select>
          <label>Birth year</label><select id="year"></select>
          <label>Work</label><select id="work"><option>Startup</option><option>Large company</option><option>Family biz</option><option>Government</option><option>Studying</option></select>
          <label>Aspiration</label><select id="aspire"><option>Build my own</option><option>Lead teams</option><option>Go deep</option><option>Figuring out</option></select>
          <button class="btn" id="saveCtx">Continue →</button>
        </div>
      </div>
    `;
    let yearSel = document.getElementById('year');
    for(let y=2024-14; y>=1955; y--) yearSel.innerHTML += `<option value="${y}">${y}</option>`;
    document.getElementById('saveCtx').onclick = () => {
      user.context = {
        gender: document.getElementById('gender').value,
        year: document.getElementById('year').value,
        work: document.getElementById('work').value,
        aspire: document.getElementById('aspire').value
      };
      saveUser();
      renderDashboard();
    };
  }
  
  function renderDashboard() {
    document.getElementById('landing').style.display = 'none';
    let scores = user.scores || [];
    let games = ['BART','PD','TOH','STROOP','GNG','ULT'];
    let completed = games.filter(g => scores.find(s=>s.game===g)).length;
    let hasB = scores.find(s=>s.game==='BART');
    let hasP = scores.find(s=>s.game==='PD');
    let hasT = scores.find(s=>s.game==='TOH');
    let hasS = scores.find(s=>s.game==='STROOP');
    let hasG = scores.find(s=>s.game==='GNG');
    let hasU = scores.find(s=>s.game==='ULT');
    
    let gamesHtml = `
      <div class="container">
        <div class="card"><h2>Hey ${user.name.split(' ')[0]} 👋</h2><p>Complete all 6 games</p>
        <div class="progress-bar"><div class="progress-fill" style="width:${completed*16.66}%"></div></div>
        <p>${completed}/6 games</p></div>
    `;
    let gameList = [
      {code:'BART', name:'🎈 Dum', desc:'Risk · Balloon', done:hasB, unlock:true},
      {code:'PD', name:'🤝 Bharosa', desc:'Trust · Prisoner', done:hasP, unlock:hasB},
      {code:'TOH', name:'🗼 Burj', desc:'Planning · Hanoi', done:hasT, unlock:hasP},
      {code:'STROOP', name:'🎨 Rukawat', desc:'Focus · Stroop', done:hasS, unlock:hasT},
      {code:'GNG', name:'⚡ Ruk', desc:'Impulse · Go/No-Go', done:hasG, unlock:hasS},
      {code:'ULT', name:'💰 Saudaa', desc:'Fairness · Ultimatum', done:hasU, unlock:hasG}
    ];
    for(let g of gameList) {
      if(g.done) {
        gamesHtml += `<div class="card" style="border-left-color:#2b7a4b; border-left-width:5px">✓ ${g.name} completed</div>`;
      } else if(g.unlock) {
        gamesHtml += `<div class="card game-card" onclick="startGame('${g.code}')"><div><div class="pill">Play</div><div><strong>${g.name}</strong> — ${g.desc}</div></div></div>`;
      } else {
        gamesHtml += `<div class="card" style="opacity:0.5">🔒 ${g.name} (complete previous game first)</div>`;
      }
    }
    gamesHtml += `<button class="btn-outline btn-sm" onclick="exportProfile()">📤 Export profile</button>
                  <button class="btn-outline btn-sm" style="margin-left:10px" onclick="resetAll()">⚠️ Reset all data</button></div>`;
    document.getElementById('dynamic').innerHTML = gamesHtml;
  }
  
  function exportProfile() {
    let data = { name: user.name, context: user.context, scores: user.scores };
    let blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'raah_profile.json';
    a.click();
  }
  
  function resetAll() {
    if(confirm('Delete all data? Cannot undo.')) {
      localStorage.removeItem(STORAGE_KEY);
      user = null;
      renderLanding();
    }
  }
  
  // ---------- GAME UTILITIES ----------
  function showGameScreen(html, onBack) {
    document.getElementById('dynamic').innerHTML = `<div class="container">${html}</div>`;
    if(onBack) document.getElementById('gameBackBtn')?.addEventListener('click', onBack);
  }
  
  function saveGameResult(gameCode, score, label, insight) {
    user.scores = user.scores || [];
    user.scores = user.scores.filter(s => s.game !== gameCode);
    user.scores.push({ game: gameCode, score, label, insight, date: new Date().toISOString() });
    saveUser();
    renderDashboard();
  }
  
  function showResults(title, score, label, insight, gameCode) {
    let icon = {BART:'🎈',PD:'🤝',TOH:'🗼',STROOP:'🎨',GNG:'⚡',ULT:'💰'}[gameCode];
    showGameScreen(`
      <div class="card text-center">
        <div style="font-size:64px">${icon}</div>
        <h2>${title} complete!</h2>
        <div class="surface"><span style="font-size:36px">${score}</span><br>Score</div>
        <div class="surface"><strong>${label}</strong></div>
        <p>${insight}</p>
        <button class="btn" id="resultsContinue">Continue →</button>
      </div>
    `);
    document.getElementById('resultsContinue').onclick = () => {
      saveGameResult(gameCode, score, label, insight);
    };
  }
  
  // ==================== GAME 1: BART ====================
  window.startGame = function(game) {
    if(game === 'BART') startBART();
    else if(game === 'PD') startPD();
    else if(game === 'TOH') startTOH();
    else if(game === 'STROOP') startStroop();
    else if(game === 'GNG') startGNG();
    else if(game === 'ULT') startULT();
  };
  
  function startBART() {
    window.bartRound = 0;
    window.bartBank = 0;
    window.bartTrials = [];
    nextBalloon();
    function nextBalloon() {
      if(window.bartRound >= 30) return endBART();
      let colors = ['blue','yellow','red'];
      let maxPump = {blue:64, yellow:32, red:16};
      let color = colors[Math.floor(Math.random()*3)];
      window.currentBalloon = { pumps:0, popped:false, color, threshold: Math.floor(Math.random()*maxPump[color])+1 };
      renderBalloon();
    }
    function renderBalloon() {
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 1/6 · Dum</div>
          <div class="balloon" id="balloonImg">🎈</div>
          <div>Pumps: ${window.currentBalloon.pumps}</div>
          <div>Current: ₹${window.currentBalloon.pumps*5}</div>
          <div>Banked: ₹${window.bartBank}</div>
          <div class="flex">
            <button class="btn" id="pumpBtn">💨 Pump (₹5)</button>
            <button class="btn btn-outline" id="collectBtn">💰 Collect</button>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(window.bartRound/30)*100}%"></div></div>
          <p>Balloon ${window.bartRound+1}/30</p>
        </div>
      `, () => renderDashboard());
      document.getElementById('pumpBtn').onclick = () => {
        if(window.currentBalloon.popped) return;
        window.currentBalloon.pumps++;
        let img = document.getElementById('balloonImg');
        if(img) img.style.transform = `scale(${1+window.currentBalloon.pumps/30})`;
        if(window.currentBalloon.pumps >= window.currentBalloon.threshold) {
          window.currentBalloon.popped = true;
          if(img) img.innerHTML = '💥';
          setTimeout(() => {
            window.bartTrials.push({pumps:window.currentBalloon.pumps, exploded:true});
            window.bartRound++;
            if(window.bartRound<30) nextBalloon();
            else endBART();
          }, 500);
        } else {
          renderBalloon();
        }
      };
      document.getElementById('collectBtn').onclick = () => {
        if(window.currentBalloon.popped) return;
        let earned = window.currentBalloon.pumps * 5;
        window.bartBank += earned;
        window.bartTrials.push({pumps:window.currentBalloon.pumps, exploded:false});
        window.bartRound++;
        if(window.bartRound<30) nextBalloon();
        else endBART();
      };
    }
    function endBART() {
      let safePumps = window.bartTrials.filter(t=>!t.exploded).map(t=>t.pumps);
      let avg = safePumps.length ? safePumps.reduce((a,b)=>a+b,0)/safePumps.length : 0;
      let score = Math.min(100, Math.round((avg/20)*100));
      let label = score>=70?'Risk-Taker':score>=40?'Balanced':'Cautious';
      let insight = `Average pumps: ${avg.toFixed(1)}. ${score>70?'You chase rewards':score>40?'You balance risk':'You lock gains early'}.`;
      showResults('Dum', score, label, insight, 'BART');
    }
  }
  
  // ==================== GAME 2: Prisoner's Dilemma ====================
  function startPD() {
    window.pdRound = 0;
    window.pdScore = 0;
    window.pdMoves = [];
    nextPD();
    function nextPD() { if(window.pdRound>=10) return endPD(); renderPD(); }
    function renderPD() {
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 2/6 · Bharosa</div>
          <h3>Round ${window.pdRound+1}/10</h3>
          <div class="surface">Your score: ${window.pdScore}</div>
          <div class="flex">
            <button class="btn" id="coopBtn">🤝 Cooperate</button>
            <button class="btn btn-outline" id="defectBtn">🔪 Defect</button>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(window.pdRound/10)*100}%"></div></div>
        </div>
      `, () => renderDashboard());
      document.getElementById('coopBtn').onclick = () => pdMove('C');
      document.getElementById('defectBtn').onclick = () => pdMove('D');
    }
    function pdMove(my) {
      let ai = (window.pdRound===0) ? 'C' : (Math.random()<0.3 ? 'D' : window.pdMoves[window.pdMoves.length-1].my);
      let payoff = {CC:[3,3], CD:[0,5], DC:[5,0], DD:[1,1]};
      let gain = payoff[my+ai][0];
      window.pdScore += gain;
      window.pdMoves.push({my,ai});
      window.pdRound++;
      nextPD();
    }
    function endPD() {
      let coop = window.pdMoves.filter(m=>m.my==='C').length;
      let score = Math.round((coop/10)*100);
      let label = score>=70?'Trusting':score>=40?'Strategic':'Independent';
      let insight = `Cooperated ${coop}/10 times. ${score>70?'You lead with trust':score>40?'You adapt':'You protect yourself first'}.`;
      showResults('Bharosa', score, label, insight, 'PD');
    }
  }
  
  // ==================== GAME 3: Tower of Hanoi ====================
  function startTOH() {
    window.tohPegs = [[4,3,2,1],[],[]];
    window.tohMoves = 0;
    window.tohSelected = null;
    renderTOH();
    function renderTOH() {
      let pegsHtml = window.tohPegs.map((peg, idx) => `
        <div class="toh-peg ${window.tohSelected===idx ? 'selected' : ''}" data-peg="${idx}">
          <div class="toh-discs">${peg.slice().reverse().map(d => `<div class="disc" style="width:${30+d*10}px"></div>`).join('')}</div>
          <div style="height:50px; width:3px; background:#aaa; margin:5px auto"></div>
          <div>Peg ${idx+1}</div>
        </div>
      `).join('');
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 3/6 · Burj</div>
          <div>Moves: ${window.tohMoves}</div>
          <div class="flex" style="justify-content:center; gap:12px">${pegsHtml}</div>
          <button class="btn-outline btn-sm" id="resetTower">Reset</button>
          <button class="btn" id="checkWin">Check Win</button>
          <div class="progress-bar"><div class="progress-fill" style="width:${(window.tohPegs[2].length/4)*100}%"></div></div>
          <p style="font-size:12px">Click peg → select, click another peg → move top disc. Big disc cannot go on small disc.</p>
        </div>
      `, () => renderDashboard());
      document.querySelectorAll('.toh-peg').forEach(el => {
        el.onclick = () => {
          let pegIdx = parseInt(el.dataset.peg);
          if(window.tohSelected === null) {
            if(window.tohPegs[pegIdx].length) window.tohSelected = pegIdx;
          } else {
            let from = window.tohSelected, to = pegIdx;
            if(from !== to) {
              let fromDisc = window.tohPegs[from][window.tohPegs[from].length-1];
              let toDisc = window.tohPegs[to][window.tohPegs[to].length-1];
              if(!toDisc || fromDisc < toDisc) {
                window.tohPegs[to].push(window.tohPegs[from].pop());
                window.tohMoves++;
              }
            }
            window.tohSelected = null;
            renderTOH();
          }
        };
      });
      document.getElementById('resetTower').onclick = () => startTOH();
      document.getElementById('checkWin').onclick = () => {
        if(window.tohPegs[2].length === 4) {
          let score = Math.min(100, Math.max(0, 100 - (window.tohMoves-15)*3));
          let label = score>=80?'Architect':score>=50?'Planner':'Explorer';
          let insight = `Solved in ${window.tohMoves} moves. Optimal 15.`;
          showResults('Burj', Math.round(score), label, insight, 'TOH');
        } else alert('Not solved yet! Move all discs to Peg 3.');
      };
    }
  }
  
  // ==================== GAME 4: Stroop ====================
  function startStroop() {
    let trials = [];
    for(let i=0;i<20;i++) {
      let words = ['RED','GREEN','BLUE','YELLOW'];
      let inks = ['RED','GREEN','BLUE','YELLOW'];
      trials.push({word:words[Math.floor(Math.random()*4)], ink:inks[Math.floor(Math.random()*4)]});
    }
    let idx=0, correct=0;
    function next() {
      if(idx>=20) return end();
      let t = trials[idx];
      let colorMap = {RED:'#e53e3e', GREEN:'#2f855a', BLUE:'#2b6cb0', YELLOW:'#d69e2e'};
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 4/6 · Rukawat (Stroop)</div>
          <div class="stroop-word" style="color:${colorMap[t.ink]}">${t.word}</div>
          <div class="flex" style="justify-content:center">${['RED','GREEN','BLUE','YELLOW'].map(c=>`<button class="btn-outline" data-color="${c}">${c}</button>`).join('')}</div>
          <div>Trial ${idx+1}/20</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(idx/20)*100}%"></div></div>
          <p>Ignore the word, pick the INK color.</p>
        </div>
      `, () => renderDashboard());
      document.querySelectorAll('[data-color]').forEach(btn => {
        btn.onclick = () => {
          if(btn.dataset.color === t.ink) correct++;
          idx++;
          next();
        };
      });
    }
    function end() {
      let acc = Math.round((correct/20)*100);
      let label = acc>=85?'Focused':acc>=65?'Steady':'Distractible';
      let insight = `Accuracy ${acc}%. ${acc>80?'Excellent inhibition':acc>60?'Good but distracted':'Word meaning pulls your attention'}.`;
      showResults('Rukawat', acc, label, insight, 'STROOP');
    }
    next();
  }
  
  // ==================== GAME 5: Go/No-Go ====================
  function startGNG() {
    let trials = [];
    for(let i=0;i<30;i++) trials.push(Math.random()<0.7 ? 'go' : 'nogo');
    let idx=0, hits=0, errors=0, timer=null;
    function next() {
      if(idx>=30) return end();
      let type = trials[idx];
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 5/6 · Ruk</div>
          <div style="font-size:80px; margin:20px">${type==='go'?'⚪':'⬛'}</div>
          <button class="btn" id="tapBtn">🔘 TAP</button>
          <div>Hits: ${hits} | Errors: ${errors}</div>
          <div>Trial ${idx+1}/30</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(idx/30)*100}%"></div></div>
          <p>Circle → TAP &nbsp; Square → DO NOTHING</p>
        </div>
      `, () => renderDashboard());
      timer = setTimeout(() => {
        if(type === 'go') { errors++; idx++; next(); }
      }, 700);
      document.getElementById('tapBtn').onclick = () => {
        clearTimeout(timer);
        if(type === 'go') hits++;
        else errors++;
        idx++;
        next();
      };
    }
    function end() {
      let goCount = trials.filter(t=>t==='go').length;
      let acc = Math.round((hits/goCount)*100);
      let label = acc>=85?'Controlled':acc>=65?'Steady':'Impulsive';
      let insight = `Hit ${hits}/${goCount} Go trials. ${acc>80?'Excellent impulse control':acc>60?'Sometimes react when you shouldn\'t':'Act before thinking'}.`;
      showResults('Ruk', acc, label, insight, 'GNG');
    }
    next();
  }
  
  // ==================== GAME 6: Ultimatum ====================
  function startULT() {
    let offers = [18,42,10,35,50,25,15,40,5,30];
    let idx=0, total=0, results=[];
    function next() {
      if(idx>=10) return end();
      let offer = offers[idx];
      showGameScreen(`
        <button id="gameBackBtn" class="btn-outline btn-sm">← Dashboard</button>
        <div class="card text-center">
          <div class="pill">Game 6/6 · Saudaa</div>
          <div style="font-size:56px; font-weight:bold; color:#c47a2e">₹${offer}</div>
          <p>AI offers you ₹${offer} out of ₹100</p>
          <div class="flex">
            <button class="btn" id="acceptBtn">✅ Accept</button>
            <button class="btn-outline" id="rejectBtn">❌ Reject</button>
          </div>
          <div>Total earned: ₹${total}</div>
          <div>Round ${idx+1}/10</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${(idx/10)*100}%"></div></div>
        </div>
      `, () => renderDashboard());
      document.getElementById('acceptBtn').onclick = () => { total += offer; results.push({offer, accept:true}); idx++; next(); };
      document.getElementById('rejectBtn').onclick = () => { results.push({offer, accept:false}); idx++; next(); };
    }
    function end() {
      let accepted = results.filter(r=>r.accept).length;
      let minAcc = results.filter(r=>r.accept).length ? Math.min(...results.filter(r=>r.accept).map(r=>r.offer)) : 0;
      let score = minAcc>=35?85 : minAcc>=20?65 : minAcc>=10?45 : 25;
      let label = score>=75?'Fair':score>=50?'Strategic':'Opportunist';
      let insight = `Accepted ${accepted}/10 offers. Lowest accepted ₹${minAcc}. ${score>70?'Rejects unfair deals':score>50?'Pragmatic boundaries':'Takes whatever offered'}.`;
      showResults('Saudaa', score, label, insight, 'ULT');
    }
    next();
  }
  
  // INIT
  loadUser();
  render();
</script>
</body>
</html>
