<!DOCTYPE html>
<html>
<head>
  <title>Behavior Insight Prototype</title>
  <style>
    body { font-family: Arial; padding: 30px; max-width: 700px; margin: auto; }
    button { margin: 5px; padding: 10px; }
    .insight { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
  </style>
</head>

<body>

<h2>Behavior Insight Prototype</h2>

<div id="input-section">
  <h3>Simulated Game Results (for testing)</h3>

  <label>Avg Pumps (Balloon):</label>
  <input type="number" id="risk" value="20"><br><br>

  <label>Loss Response (improves / no_change):</label>
  <input type="text" id="loss" value="no_change"><br><br>

  <label>Trust Behavior (high / low):</label>
  <input type="text" id="trust" value="high"><br><br>

  <label>Planning Efficiency (0 to 1):</label>
  <input type="number" step="0.1" id="planning" value="0.6"><br><br>

  <button onclick="runAnalysis()">Generate Insights</button>
</div>

<div id="results"></div>

<script>
let feedbackLog = [];
let currentInsight = "";

function runAnalysis() {
  const data = {
    riskLevel: parseInt(document.getElementById("risk").value),
    lossResponse: document.getElementById("loss").value,
    trust: document.getElementById("trust").value,
    planning: parseFloat(document.getElementById("planning").value)
  };

  const insights = generateInsights(data);
  displayInsights(insights);
}

function generateInsights(data) {
  let insights = [];

  if (data.riskLevel > 25 && data.lossResponse === "no_change") {
    insights.push("You continue taking risks even after losses. This may work in high-reward environments but can hurt in structured roles.");
  } else if (data.riskLevel < 10) {
    insights.push("You avoid risk unless outcomes are clear. You may prefer stability over uncertain upside.");
  }

  if (data.lossResponse === "improves") {
    insights.push("You adapt your behavior after setbacks. This shows strong learning ability.");
  } else {
    insights.push("You don’t significantly change behavior after setbacks, which may slow learning.");
  }

  if (data.trust === "high") {
    insights.push("You tend to trust others easily, which helps in collaboration but may expose you to risk.");
  } else {
    insights.push("You are cautious in trusting others, which protects you but may limit collaboration.");
  }

  if (data.planning > 0.8) {
    insights.push("You plan ahead and think structurally before acting.");
  } else {
    insights.push("You prefer to figure things out as you go rather than planning upfront.");
  }

  return insights;
}

function displayInsights(insights) {
  const container = document.getElementById("results");
  container.innerHTML = "<h3>Your Insights</h3>";

  insights.forEach(insight => {
    const div = document.createElement("div");
    div.className = "insight";

    div.innerHTML = `
      <p>${insight}</p>
      <button onclick="captureFeedback('${insight}', 'yes')">Yes</button>
      <button onclick="captureFeedback('${insight}', 'somewhat')">Somewhat</button>
      <button onclick="captureFeedback('${insight}', 'no')">No</button>
    `;

    container.appendChild(div);
  });

  const finishBtn = document.createElement("button");
  finishBtn.innerText = "Finish & See Accuracy";
  finishBtn.onclick = showAccuracy;

  container.appendChild(finishBtn);
}

function captureFeedback(insight, response) {
  feedbackLog.push({ insight, response });
}

function showAccuracy() {
  const total = feedbackLog.length;
  const positive = feedbackLog.filter(f => f.response === "yes").length;

  const score = Math.round((positive / total) * 100);

  document.getElementById("results").innerHTML = `
    <h3>Accuracy Score: ${score}%</h3>
    <p>This is based on how many insights you agreed with.</p>
  `;
}
</script>

</body>
</html>
